<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#070b14"/>
      <stop offset="100%" stop-color="#0a1525"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="circle-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow blob top-right -->
  <circle cx="950" cy="200" r="350" fill="url(#circle-glow)" filter="url(#blur)"/>

  <!-- Grid lines subtle -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Brand mark (shield) -->
  <g transform="translate(80, 70)">
    <rect width="56" height="56" rx="14" fill="url(#accent)"/>
    <!-- Football simplified -->
    <circle cx="28" cy="28" r="14" fill="white" opacity="0.9"/>
    <circle cx="28" cy="28" r="6" fill="#111"/>
    <line x1="28" y1="14" x2="28" y2="42" stroke="#111" stroke-width="1.5"/>
    <line x1="14" y1="28" x2="42" y2="28" stroke="#111" stroke-width="1.5"/>
  </g>

  <!-- Brand text -->
  <text x="152" y="104" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="28" fill="white" opacity="0.95">MF Pro</text>
  <text x="152" y="126" font-family="Arial, sans-serif" font-size="14" fill="#4ade80" letter-spacing="1">MERCADO FÚTBOL PRO</text>

  <!-- Live badge -->
  <rect x="80" y="170" width="140" height="30" rx="15" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.4)" stroke-width="1"/>
  <circle cx="102" cy="185" r="5" fill="#22c55e"/>
  <text x="116" y="190" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#4ade80" letter-spacing="1">EN DIRECTO</text>

  <!-- Main heading -->
  <text x="80" y="280" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="72" fill="white">Fichajes &amp;</text>
  <text x="80" y="370" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="72" fill="url(#accent)">Rumores 2026</text>

  <!-- Subtitle -->
  <text x="80" y="430" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.55)" letter-spacing="0.5">
    Noticias contrastadas · Mercado en tiempo real
  </text>

  <!-- Stats row -->
  <g transform="translate(80, 490)">
    <!-- Stat 1 -->
    <rect width="160" height="68" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="80" y="30" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="28" fill="#22c55e" text-anchor="middle">53</text>
    <text x="80" y="52" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1">FICHAJES</text>
    <!-- Stat 2 -->
    <rect x="176" width="160" height="68" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="256" y="30" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="28" fill="#22c55e" text-anchor="middle">20</text>
    <text x="256" y="52" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1">RUMORES</text>
    <!-- Stat 3 -->
    <rect x="352" width="180" height="68" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="442" y="30" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="28" fill="#22c55e" text-anchor="middle">2.131 M€</text>
    <text x="442" y="52" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1">MOVIDOS</text>
  </g>

  <!-- Right decorative element — trophy/ball -->
  <g transform="translate(820, 120)" opacity="0.18">
    <circle cx="190" cy="190" r="180" stroke="url(#accent)" stroke-width="2" fill="none"/>
    <circle cx="190" cy="190" r="140" stroke="rgba(34,197,94,0.5)" stroke-width="1" fill="none"/>
    <circle cx="190" cy="190" r="90" fill="rgba(34,197,94,0.08)"/>
  </g>
  <g transform="translate(900, 200)" opacity="0.7">
    <circle cx="110" cy="110" r="110" fill="rgba(14,18,30,0.8)"/>
    <!-- Ball -->
    <circle cx="110" cy="110" r="90" fill="white" opacity="0.95"/>
    <circle cx="110" cy="110" r="90" fill="none" stroke="#ddd" stroke-width="1"/>
    <!-- Pentagon patches -->
    <circle cx="110" cy="110" r="30" fill="#111"/>
    <circle cx="110" cy="30" r="18" fill="#111"/>
    <circle cx="176" cy="68" r="18" fill="#111"/>
    <circle cx="152" cy="178" r="18" fill="#111"/>
    <circle cx="68" cy="178" r="18" fill="#111"/>
    <circle cx="44" cy="68" r="18" fill="#111"/>
    <!-- Shine -->
    <ellipse cx="75" cy="72" rx="26" ry="16" fill="rgba(255,255,255,0.35)" transform="rotate(-30 75 72)"/>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="80" y="625" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.3)">sefiro888.github.io/mercado-futbol-pro</text>
  <text x="1120" y="625" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="end">2026</text>
</svg>
