<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Compatibilidad con enlaces antiguos sin "#": /fichajes -> /#/fichajes.
         Necesario porque GitHub Pages no resuelve rutas de SPA en el servidor. -->
    <script>
      (function () {
        // Solo actúa sobre enlaces antiguos con sub-ruta real, p. ej.
        // /mercado-futbol-pro/fichajes -> /mercado-futbol-pro/#/fichajes
        // Nunca toca la raíz (/mercado-futbol-pro/) para evitar bucles.
        var base = '/mercado-futbol-pro/'
        var path = window.location.pathname
        if (path.indexOf(base) === 0 && !window.location.hash) {
          var rest = path.slice(base.length)
          if (rest) {
            window.location.replace(base + '#/' + rest + window.location.search)
          }
        }
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Tipografía moderna. Si no hay red, el CSS recurre a fuentes del sistema. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Conexión anticipada a los CDNs de imágenes (escudos, banderas y fotos
         de jugadores): ahorra el coste de la primera conexión en cada dominio. -->
    <link rel="preconnect" href="https://media.api-sports.io" crossorigin />
    <link rel="preconnect" href="https://flagcdn.com" crossorigin />
    <link rel="preconnect" href="https://r2.thesportsdb.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800;900&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />

    <!-- SEO base. El <title> y la descripción se actualizan por página vía src/lib/seo.js -->
    <title>Mercado Fútbol Pro · Noticias, fichajes y rumores contrastados</title>
    <meta
      name="description"
      content="Portal deportivo de análisis: noticias de fútbol, fichajes confirmados y rumores contrastados con fuentes reales. Tablas de traspasos con análisis económico."
    />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0b0f17" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Mercado Fútbol Pro" />
    <meta property="og:title" content="Mercado Fútbol Pro · Noticias, fichajes y rumores contrastados" />
    <meta
      property="og:description"
      content="Noticias de fútbol, fichajes confirmados y rumores contrastados con fuentes reales."
    />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:url" content="https://sefiro888.github.io/mercado-futbol-pro/" />
    <meta property="og:image" content="https://sefiro888.github.io/mercado-futbol-pro/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Mercado Fútbol Pro — Fichajes y rumores 2026" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mercado Fútbol Pro" />
    <meta
      name="twitter:description"
      content="Noticias de fútbol, fichajes y rumores contrastados con fuentes reales."
    />
    <meta name="twitter:image" content="https://sefiro888.github.io/mercado-futbol-pro/og-image.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
